<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bahasa Indonesia (Gaul) App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Belajar Bahasa Indonesia</h1>
      </header>

      <main id="home-module">
        <div class="menu-grid">
          <button class="menu-card" onclick="ouvrirModalAjout()">
            <span class="icon">➕</span>
            <div class="menu-text">
              <h3>Ajouter</h3>
              <p>Enrichir ton dictionnaire</p>
            </div>
          </button>

          <button class="menu-card" onclick="ouvrirDictionnaire()">
            <span class="icon">📖</span>
            <div class="menu-text">
              <h3>Dictionnaire</h3>
              <p>Voir mes <span id="nb-mots-dict">0</span> mots</p>
            </div>
          </button>

          <button class="menu-card" onclick="showModule('flashcard-section')">
            <span class="icon">🎴</span>
            <div class="menu-text">
              <h3>Flashcards</h3>
              <p>Maîtrise ton vocabulaire</p>
            </div>
          </button>

          <button class="menu-card" onclick="showModule('generator-section')">
            <span class="icon">✍️</span>
            <div class="menu-text">
              <h3>Générateur</h3>
              <p>Phrases avec l'IA</p>
            </div>
          </button>

          <button class="menu-card" onclick="showModule('chat-section')">
            <span class="icon">💬</span>
            <div class="menu-text">
              <h3>Conversation</h3>
              <p>Discute en Bahasa Gaul</p>
            </div>
          </button>
        </div>

        <div
          id="modal-ajout"
          class="module hidden"
          style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <div class="glass-card" style="width: 90%; max-width: 400px; text-align: left">
            <h2 style="color: var(--primary); margin-top: 0">Nouveau mot 🇮🇩</h2>
            <label>Français</label>
            <input type="text" id="new-fr" placeholder="ex: Travail" />
            <label>Langage courant</label>
            <input type="text" id="new-gaul" placeholder="ex: Kerja / Nguli" />
            <label>Formel</label>
            <input type="text" id="new-baku" placeholder="ex: Bekerja" />
            <label>Phrase d'exemple</label>
            <input type="text" id="new-exemple" placeholder="ex: Gue lagi kerja nih" />
            <label>Traduction de la phrase</label>
            <input type="text" id="new-exemple-trad" placeholder="ex: Je suis en train de bosser" />
            <div class="controls" style="margin-top: 20px">
              <button class="btn-wrong" onclick="fermerModalAjout()">Annuler</button>
              <button class="btn-right" onclick="ajouterNouveauMot()">Enregistrer</button>
            </div>
          </div>
        </div>

        <button
          class="btn-back"
          style="margin-top: 50px; opacity: 0.6; font-size: 0.7rem"
          onclick="resetComplet()"
        >
          ⚠️ Réinitialiser toute la progression
        </button>
      </main>

      <main id="flashcard-section" class="module hidden">
        <div class="progress-container flashcard-progress">
          <div class="progress-bar" id="progress-fill" style="width: 0%"></div>
          <span class="progress-text"
            ><span id="mots-acquis">0</span> / <span id="total-mots">0</span> maîtrisés</span
          >
        </div>
        <div class="flashcard" id="carte">
          <div class="card-face card-front">
            <div id="content-front" class="question">Appuie sur "Commencer"</div>
          </div>
          <div class="card-face card-back"><div id="content-back"></div></div>
        </div>
        <div class="controls" id="controls-start">
          <button class="btn-primary" onclick="piocherMot()">Commencer</button>
        </div>
        <div class="controls hidden" id="controls-answer">
          <button class="btn-primary" onclick="retournerCarte()">Voir la réponse</button>
        </div>
        <div class="controls hidden" id="controls-eval">
          <button class="btn-wrong" onclick="evaluer(false)">Faux</button>
          <button class="btn-right" onclick="evaluer(true)">Juste</button>
        </div>
        <button class="btn-back" onclick="showModule('home-module')">← Retour au menu</button>
      </main>

      <main id="dictionary-section" class="module hidden">
        <div class="glass-card">
          <h2>Mon Dictionnaire</h2>
          <div class="search-bar">
            <input
              type="text"
              id="dict-search"
              placeholder="Rechercher un mot..."
              oninput="filtrerDictionnaire()"
            />
          </div>
          <div
            id="dictionary-list"
            class="dictionary-list"
            style="max-height: 400px; overflow-y: auto; margin-top: 20px"
          ></div>
        </div>
        <button class="btn-back" onclick="showModule('home-module')">← Retour au menu</button>
      </main>

      <main id="generator-section" class="module hidden">
        <div class="glass-card">
          <h2>Générateur de Phrases</h2>
          <div id="phrase-result" class="result-area">La phrase apparaîtra ici...</div>
          <button class="btn-primary" onclick="genererPhraseAvecIA()">Générer une phrase</button>
        </div>
        <button class="btn-back" onclick="showModule('home-module')">← Retour au menu</button>
      </main>

      <main id="chat-section" class="module hidden">
        <div class="glass-card">
          <h2>Conversation avec Gemini</h2>
          <div id="chat-window" class="chat-window">
            <p><em>Système : Selamat datang! Discutons.</em></p>
          </div>
          <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Dis quelque chose..." />
            <button class="btn-right" onclick="envoyerMessage()">OK</button>
          </div>
        </div>
        <button class="btn-back" onclick="showModule('home-module')">← Retour au menu</button>
      </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
